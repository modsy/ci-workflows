# .github/workflows/pr-review.yml
#
# Codex PR review — for repos with internal contributors only (no fork PRs).
#
# Triggers mirror GitHub Copilot code review:
#   opened:            review when a non-draft PR is first opened.
#   synchronize:       re-review when new commits are pushed.
#   reopened:          review when a closed PR is reopened.
#   ready_for_review:  review when a draft PR is marked ready.
#
# Remove "synchronize" if you want one review per PR lifecycle event rather
# than one per push (lower cost, fewer notifications).
#
# Copy this file to .github/workflows/pr-review.yml in your service repo.
# Adjust pre_install_command for your stack (or remove if not needed).

name: PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review (required for manual runs)"
        required: true
        type: number

concurrency:
  group: codex-pr-review-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: false

jobs:
  codex-review:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.draft == false

    uses: modsy/ci-workflows/.github/workflows/codex-pr-review.yml@main

    with:
      pr_number: ${{ inputs.pr_number }}

      # Optional: install project dependencies before Codex runs.
      # Examples:
      #   Node only:             "npm ci"
      #   Python only:           "pip install -r requirements.txt"
      #   Django + React stack:  "pip install -r requirements.txt && npm ci"
      pre_install_command: ""

      codex_version: "0.142.0"

    secrets:
      CODEX_ACCESS_TOKEN: ${{ secrets.CODEX_ACCESS_TOKEN }}
