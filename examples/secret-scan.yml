# .github/workflows/secret-scan.yml
#
# Secret and PII scan on every PR, for repos with internal contributors only
# (no fork PRs). Blocks hardcoded secrets before they merge.
#
# Copy this file to .github/workflows/secret-scan.yml in your repo. No secrets
# to configure: gitleaks runs from a directly-downloaded binary (no license
# key). The scan is zero-config and stack-agnostic.

name: Secret Scan

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  secret-scan:
    # Skip drafts; scan everything else.
    if: github.event.pull_request.draft == false

    uses: modsy/ci-workflows/.github/workflows/secret-scan.yml@main

    with:
      # "diff" (default) scans only what the PR adds. "full" audits all history.
      scan_scope: "diff"

      # true (default) blocks the PR on a secret finding. Keep true.
      fail_on_secrets: true

      # Advisory PII sweep (email/SSN/phone). Never blocks. Turn on for repos
      # that may touch personal data.
      # scan_pii: true

      # Optional custom rules / allowlist for known fixtures.
      # gitleaks_config: ".gitleaks.toml"
