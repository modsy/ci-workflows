# .github/workflows/pr-review.yml
#
# Claude AI PR review — for repos that receive pull requests from forks.
#
# Uses `pull_request_target`, which runs in the context of the BASE branch and
# has access to repo secrets even for fork PRs. This is required for the review
# to have the ANTHROPIC_API_KEY available.
#
# SECURITY: pull_request_target + repo secrets + fork checkout = exfiltration
# risk. The `if:` condition on the job is a MANDATORY fork guard. It restricts
# automatic reviews to same-repo PRs only. workflow_dispatch is allowed through
# so maintainers can manually review a fork PR they have inspected and trust.
#
# DO NOT remove or weaken the if: condition.
# DO NOT use persist-credentials: true — the reusable workflow already uses
# persist-credentials: false.
#
# Copy this file to .github/workflows/pr-review.yml in your service repo.

name: PR Review

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review (required for manual runs)"
        required: true
        type: number

permissions:
  contents: read
  pull-requests: write

# One review at a time per PR; never cancel an in-flight review.
concurrency:
  group: claude-pr-review-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: false

jobs:
  claude-review:
    # FORK GUARD — mandatory for pull_request_target.
    #
    # Automatic reviews run only when both conditions hold:
    #   1. The PR head is in the same repo (not a fork). This prevents a
    #      malicious fork from exfiltrating the ANTHROPIC_API_KEY.
    #   2. The PR is not a draft.
    #
    # workflow_dispatch bypasses both checks so maintainers can manually
    # review a fork PR they have already inspected and decided to trust.
    #
    # The guard MUST be on the job if: — never on a separate prerequisite job.
    # A skipped prerequisite does not block downstream `needs:` dependents.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.head.repo.full_name == github.repository &&
       github.event.pull_request.draft == false)

    uses: modsy/ci-workflows/.github/workflows/claude-pr-review.yml@main

    with:
      pr_number: ${{ github.event.pull_request.number || inputs.pr_number }}

      # Optional: install project dependencies before the review.
      # pre_install_command: "npm ci"

      # Optional: pin the model for reproducible reviews.
      # model: "claude-sonnet-4-6"

    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
