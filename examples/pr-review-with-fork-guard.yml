# .github/workflows/pr-review.yml
#
# Codex PR review — for repos that receive pull requests from forks.
#
# Uses `pull_request_target`, which runs in the context of the BASE branch
# and has access to repo secrets even for fork PRs. This is necessary for
# workflow_dispatch reruns (manual re-trigger on any PR) to work correctly.
#
# SECURITY: pull_request_target + repo secrets + fork checkout = exfiltration
# risk. The `if:` condition on the job is a MANDATORY fork guard. It restricts
# automatic reviews to same-repo PRs only. workflow_dispatch is allowed through
# so maintainers can manually trigger a review on any PR they inspect and trust.
#
# DO NOT remove or weaken the if: condition.
# DO NOT check out the PR head with persist-credentials: true — the reusable
# workflow already uses persist-credentials: false.
#
# Copy this file to .github/workflows/pr-review.yml in your service repo.

name: PR Review

on:
  pull_request_target:
    # Mirrors GitHub Copilot code review triggers.
    # Remove "synchronize" to limit to one review per PR lifecycle event.
    types: [opened, synchronize, reopened, ready_for_review]

  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review (required for manual runs)"
        required: true
        type: number

# Queue reviews for the same PR; never cancel a review already running.
concurrency:
  group: codex-pr-review-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: false

jobs:
  codex-review:
    # FORK GUARD — mandatory for pull_request_target.
    #
    # Automatic reviews run only when both conditions hold:
    #   1. The PR head is in the same repo (not a fork). This prevents a
    #      malicious fork from triggering a run that has access to secrets.
    #   2. The PR is not a draft.
    #
    # workflow_dispatch bypasses both checks so maintainers can manually
    # review any PR (including fork PRs) they have already inspected and
    # decided to trust.
    #
    # The guard MUST be on the job if: — not on a separate prerequisite job.
    # A skipped prerequisite job does not block downstream `needs:` dependents.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.head.repo.full_name == github.repository &&
       github.event.pull_request.draft == false)

    uses: modsy/ci-workflows/.github/workflows/codex-pr-review.yml@main

    with:
      pr_number: ${{ inputs.pr_number }}

      # Optional: install project dependencies before Codex runs.
      # Examples:
      #   Node only:             "npm ci"
      #   Python only:           "pip install -r requirements.txt"
      #   Django + React stack:  "pip install -r requirements.txt && npm ci"
      pre_install_command: ""

      # Pin the Codex version for reproducible reviews.
      codex_version: "0.142.0"

    secrets:
      CODEX_ACCESS_TOKEN: ${{ secrets.CODEX_ACCESS_TOKEN }}
