# .github/workflows/secret-scan.yml
#
# Secret and PII scan on every PR, for repos that receive pull requests from
# forks.
#
# Uses `pull_request_target` so the scan runs in the base-repo context and can
# post a PR comment even on fork PRs. Unlike the Codex reviewer, this workflow
# needs no API-key secret, so the fork-exfiltration risk is far lower. The guard
# below still restricts automatic runs to same-repo PRs as a precaution and
# because the reusable workflow checks out the fork's merge ref.
#
# DO NOT remove the if: condition.
#
# Copy this file to .github/workflows/secret-scan.yml in your repo.

name: Secret Scan

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  secret-scan:
    # FORK GUARD, same-repo, non-draft PRs only.
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.draft == false

    uses: modsy/ci-workflows/.github/workflows/secret-scan.yml@main

    with:
      scan_scope: "diff"
      fail_on_secrets: true
      # scan_pii: true
      # gitleaks_config: ".gitleaks.toml"
