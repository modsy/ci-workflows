# .github/workflows/secret-scan.yml
#
# Secret and PII scan on every PR, for repos that receive pull requests from
# forks.
#
# Uses `pull_request_target` so the workflow runs in the base-repo context
# (base-branch workflow definition, base-repo GITHUB_TOKEN with write scope).
#
# NOTE ON FORKS: the fork guard below restricts runs to SAME-REPO PRs, so with
# this guard in place fork PRs are NOT scanned. This is the safe default: the
# reusable workflow checks out the PR merge ref, and running against untrusted
# fork code in the privileged base context is a risk not worth taking for an
# advisory scan. If you deliberately want to scan fork PRs, relax the guard and
# review the security tradeoff first.
#
# DO NOT remove the if: condition without understanding that tradeoff.
#
# Copy this file to .github/workflows/secret-scan.yml in your repo.

name: Secret Scan

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  secret-scan:
    # FORK GUARD, same-repo, non-draft PRs only.
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.draft == false

    uses: modsy/ci-workflows/.github/workflows/secret-scan.yml@main

    with:
      scan_scope: "diff"
      fail_on_secrets: true
      # scan_pii: true
      # gitleaks_config: ".gitleaks.toml"
