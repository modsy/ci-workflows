name: Codex PR Review (Reusable)
# Called by service repos via workflow_call. Never triggered directly.
# Auth pattern: product-org-len/atlas-pp-sxs-tool-app (Vincent's implementation)
# Output pattern: GitHub Copilot (PR review with inline diff comments + verdict)
# See examples/ for ready-to-use caller workflows.

on:
  workflow_call:
    inputs:
      pr_number:
        description: >
          Pull request number to review. Auto-resolved from the triggering
          event. Required when called via workflow_dispatch.
        required: false
        type: number

      pre_install_command:
        description: >
          Optional OVERRIDE for dependency setup. Leave empty (default) and the
          workflow auto-detects the stack and installs deps for you — npm/yarn/
          pnpm, uv/pip, or go — so the caller needs zero config. Set this only
          for non-standard layouts (e.g. a package nested in a monorepo subdir).
          Runs with continue-on-error; the outcome is passed to Codex.
        required: false
        type: string
        default: ""

      codex_version:
        description: >
          @openai/codex npm version to install. Pin in your caller for
          reproducible reviews. Bump deliberately.
        required: false
        type: string
        default: "0.142.0"

    secrets:
      CODEX_ACCESS_TOKEN:
        description: >
          OpenAI API key (sk-*), agent-identity JWT, or personal access token
          (at-*) for the Codex CLI. For ChatGPT Business/Plus accounts, use
          CODEX_AUTH_JSON instead.
        required: false

      CODEX_AUTH_JSON:
        description: >
          Full contents of ~/.codex/auth.json from a machine where `codex auth`
          has been run. Preferred over CODEX_ACCESS_TOKEN for ChatGPT accounts
          because it includes the refresh token Codex uses to maintain sessions.
          Obtain with: cat ~/.codex/auth.json
        required: false

    outputs:
      review_url:
        description: "URL of the posted PR review."
        value: ${{ jobs.codex-review.outputs.review_url }}

jobs:
  codex-review:
    name: Review PR with Codex
    runs-on: ubuntu-latest

    # One active review per PR at a time. A new push cancels the in-flight
    # review of the prior commit so only HEAD is ever reviewed.
    concurrency:
      group: codex-pr-review-${{ github.repository }}-${{ github.event.pull_request.number || inputs.pr_number }}
      cancel-in-progress: true

    permissions:
      contents: read
      pull-requests: write
      issues: write

    outputs:
      review_url: ${{ steps.post_review.outputs.review_url }}

    steps:
      # ---------------------------------------------------------------
      # 1. Resolve PR number.
      # ---------------------------------------------------------------
      - name: Resolve PR number
        id: pr
        shell: bash
        env:
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          set -euo pipefail
          pr_number="${EVENT_PR_NUMBER:-${INPUT_PR_NUMBER:-}}"
          if [ -z "$pr_number" ]; then
            echo "Unable to resolve a pull request number." >&2
            exit 1
          fi
          if ! [[ "$pr_number" =~ ^[0-9]+$ ]]; then
            echo "Resolved pull request number '$pr_number' is not numeric." >&2
            exit 1
          fi
          echo "number=$pr_number" >> "$GITHUB_OUTPUT"

      # ---------------------------------------------------------------
      # 2. Check out the PR merge commit.
      #    persist-credentials: false keeps GITHUB_TOKEN out of the git
      #    config so Codex cannot use it to push or fetch.
      # ---------------------------------------------------------------
      - name: Check out PR merge commit
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ steps.pr.outputs.number }}/merge
          fetch-depth: 0
          persist-credentials: false

      # ---------------------------------------------------------------
      # 3. Fetch PR metadata, linked issues, and stamp the head SHA
      #    before Codex runs so a push mid-review cannot mislabel it.
      #
      #    Also checks for a prior bot review at this exact HEAD SHA and
      #    records the last-reviewed SHA for incremental diff mode.
      # ---------------------------------------------------------------
      - name: Fetch PR metadata and refs
        id: context
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          set -euo pipefail

          pr_json="$RUNNER_TEMP/pr.json"
          gh pr view "$PR_NUMBER" \
            --json number,title,body,url,baseRefName,baseRefOid,headRefName,headRefOid,isDraft,author \
            > "$pr_json"

          base_ref="$(jq -r '.baseRefName' "$pr_json")"

          # Capture the true PR head SHA before Codex runs.
          reviewed_sha="$(git rev-parse --short=7 'HEAD^2' 2>/dev/null \
            || jq -r '.headRefOid[0:7]' "$pr_json")"
          head_sha="$(git rev-parse 'HEAD^2' 2>/dev/null \
            || jq -r '.headRefOid' "$pr_json")"

          {
            echo "# Pull request context"
            echo
            jq -r '"- Number: #\(.number)\n- URL: \(.url)\n- Title: \(.title)\n- Author: \(.author.login)\n- Base: \(.baseRefName)@\(.baseRefOid)\n- Head: \(.headRefName)@\(.headRefOid)\n- Draft: \(.isDraft)"' "$pr_json"
            echo
            echo "## Body"
            jq -r '.body // ""' "$pr_json"
          } > "$RUNNER_TEMP/pr-context.md"

          pr_text="$(jq -r '"\(.title)\n\(.body // "")"' "$pr_json")"
          closing_refs="$(printf '%s' "$pr_text" | grep -oiE '(^|[^a-zA-Z])(close[sd]?|fix(es|ed)?|resolve[ds]?)[[:space:]:]+#[0-9]+' | grep -oE '[0-9]+' || true)"
          all_refs="$(printf '%s' "$pr_text" | grep -oE '(^|[^A-Za-z0-9_/-])#[0-9]+' | grep -oE '[0-9]+' || true)"
          refs="$(printf '%s\n%s\n' "$closing_refs" "$all_refs" \
            | awk -v self="$PR_NUMBER" 'NF && $0 != self && !seen[$0]++' \
            | head -n 6)"
          linked="$RUNNER_TEMP/linked-issues.md"
          : > "$linked"
          for n in $refs; do
            if issue_json="$(gh issue view "$n" --json number,title,state,body 2>/dev/null)"; then
              {
                echo
                printf '### Issue #%s\n\n' "$n"
                printf '%s' "$issue_json" | jq -r '"**\(.title)** [\(.state)]\n\n\(.body // "")"'
              } >> "$linked"
            fi
          done
          if [ -s "$linked" ]; then
            head -c 60000 "$linked" > "$linked.cap" && mv "$linked.cap" "$linked"
            {
              echo
              echo "## Linked issues (fetched for spec context)"
              cat "$linked"
            } >> "$RUNNER_TEMP/pr-context.md"
          fi

          # ------------------------------------------------------------------
          # Idempotency: check whether the bot already reviewed this exact HEAD.
          # Look at all PR reviews from Bot accounts that contain our marker.
          # Extract the most recent reviewed SHA from the marker pattern:
          #   _Codex review of `<sha>`_
          # If that SHA resolves to the current head_sha, skip the whole review.
          # If it resolves to a prior commit, record it for incremental diff mode.
          # ------------------------------------------------------------------
          already_reviewed="false"
          last_reviewed_sha=""

          bot_reviews="$(gh api \
            "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/reviews" \
            --paginate \
            --jq '[.[] | select(
              (.user.type == "Bot" or (.user.login | ascii_downcase | test("bot|github-actions")))
              and (.body // "" | contains("<!-- codex-reviewer -->"))
            ) | .body]' 2>/dev/null | jq -s 'add // []' || echo "[]")"

          last_reviewed_sha="$(printf '%s' "$bot_reviews" \
            | jq -r 'reverse | .[] |
                match("Codex review of `(?P<sha>[a-f0-9]{7,40})`") |
                .captures[] | select(.name == "sha") | .string' \
            | head -1 || true)"

          if [ -n "$last_reviewed_sha" ]; then
            full_last="$(git rev-parse "${last_reviewed_sha}" 2>/dev/null || true)"
            if [ -z "$full_last" ]; then
              # The last-reviewed commit is not in this checkout (e.g. it was
              # force-pushed away). Fall back to a full-PR review rather than
              # asking Codex to diff from a SHA that no longer exists.
              echo "Prior reviewed SHA ${last_reviewed_sha} not present in checkout; reviewing the full PR."
              last_reviewed_sha=""
            elif [ "$full_last" = "$head_sha" ]; then
              already_reviewed="true"
              echo "::notice::HEAD ${reviewed_sha} already has a Codex review. Skipping."
            else
              echo "Prior review found at ${last_reviewed_sha}; will review incrementally from that SHA."
            fi
          fi

          echo "base_ref=$base_ref"               >> "$GITHUB_OUTPUT"
          echo "head_sha=$head_sha"               >> "$GITHUB_OUTPUT"
          echo "reviewed_sha=$reviewed_sha"       >> "$GITHUB_OUTPUT"
          echo "already_reviewed=$already_reviewed" >> "$GITHUB_OUTPUT"
          echo "last_reviewed_sha=$last_reviewed_sha" >> "$GITHUB_OUTPUT"

      # ---------------------------------------------------------------
      # 4. Set up Node.js and install Codex CLI.
      # ---------------------------------------------------------------
      - name: Set up Node.js
        if: steps.context.outputs.already_reviewed != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Codex CLI
        if: steps.context.outputs.already_reviewed != 'true'
        run: npm install -g @openai/codex@${{ inputs.codex_version }}

      # ---------------------------------------------------------------
      # 5. Install project dependencies. Zero-config: when the caller does not
      #    set pre_install_command, auto-detect the stack and install. This is
      #    why a caller is identical across repos. Best-effort: never fails the
      #    job (continue-on-error), and the outcome is reported to Codex so it
      #    knows whether it can run the repo's typecheck/tests.
      # ---------------------------------------------------------------
      - name: Install project dependencies
        id: deps
        if: steps.context.outputs.already_reviewed != 'true'
        continue-on-error: true
        shell: bash
        env:
          PRE_INSTALL_CMD: ${{ inputs.pre_install_command }}
        run: |
          set -euo pipefail

          if [ -n "${PRE_INSTALL_CMD:-}" ]; then
            echo "method=override: ${PRE_INSTALL_CMD}" >> "$GITHUB_OUTPUT"
            echo "Running caller-provided pre_install_command: ${PRE_INSTALL_CMD}"
            eval "${PRE_INSTALL_CMD}"
            exit 0
          fi

          # Auto-detect from repo-root manifests.
          if [ -f package.json ]; then
            if [ -f pnpm-lock.yaml ]; then
              corepack enable && pnpm install --frozen-lockfile; method="pnpm install --frozen-lockfile"
            elif [ -f yarn.lock ]; then
              corepack enable && yarn install --frozen-lockfile; method="yarn install --frozen-lockfile"
            elif [ -f package-lock.json ]; then
              npm ci; method="npm ci"
            else
              npm install; method="npm install"
            fi
            if grep -q '"workspaces"' package.json 2>/dev/null; then
              npm run build --workspaces --if-present; method="${method} + build workspaces"
            fi
          elif [ -f uv.lock ]; then
            command -v uv >/dev/null 2>&1 || pip install --quiet uv
            uv sync --frozen 2>/dev/null || uv sync; method="uv sync"
          elif [ -f requirements.txt ]; then
            pip install --quiet -r requirements.txt; method="pip install -r requirements.txt"
          elif [ -f pyproject.toml ]; then
            pip install --quiet -e . 2>/dev/null || pip install --quiet .; method="pip install ."
          elif [ -f go.mod ]; then
            go mod download; method="go mod download"
          else
            method="none detected (no root manifest)"
          fi
          echo "method=${method}" >> "$GITHUB_OUTPUT"
          echo "Dependency setup: ${method}"

      # ---------------------------------------------------------------
      # 6. Enable unprivileged user namespaces for bubblewrap.
      # ---------------------------------------------------------------
      - name: Enable unprivileged user namespaces for bubblewrap
        if: steps.context.outputs.already_reviewed != 'true'
        shell: bash
        run: |
          set -euo pipefail
          if [ "$(sysctl -n kernel.unprivileged_userns_clone 2>/dev/null || true)" != "1" ]; then
            sudo sysctl -w kernel.unprivileged_userns_clone=1 || true
          fi
          if [ "$(sysctl -n kernel.apparmor_restrict_unprivileged_userns 2>/dev/null || true)" != "0" ]; then
            sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
          fi

      # ---------------------------------------------------------------
      # 6b. Check out the review prompt from THIS shared repo (not the PR
      #     under review). The prompt is trusted, version-locked to the
      #     reusable workflow's own commit, and never sourced from the PR
      #     checkout — so a PR cannot alter what the credentialed reviewer runs,
      #     and consuming repos carry no prompt of their own.
      # ---------------------------------------------------------------
      - name: Check out shared review prompt
        if: steps.context.outputs.already_reviewed != 'true'
        uses: actions/checkout@v4
        with:
          repository: modsy/ci-workflows
          ref: ${{ github.job_workflow_sha || 'main' }}
          path: .ci-shared
          persist-credentials: false

      # ---------------------------------------------------------------
      # 7. Run Codex. The prompt instructs JSON output between
      #    BEGIN_REVIEW_JSON / END_REVIEW_JSON markers so the posting
      #    step can post via createReview with inline diff comments,
      #    identical to GitHub Copilot review behavior.
      #
      #    When a prior bot review exists at an earlier SHA, the prompt
      #    tells Codex to review only the incremental diff since that SHA
      #    rather than the full PR diff, avoiding re-raising stale issues.
      # ---------------------------------------------------------------
      - name: Run Codex PR review
        id: codex
        if: steps.context.outputs.already_reviewed != 'true'
        shell: bash
        env:
          CODEX_ACCESS_TOKEN: ${{ secrets.CODEX_ACCESS_TOKEN }}
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          BASE_REF: ${{ steps.context.outputs.base_ref }}
          REVIEWED_SHA: ${{ steps.context.outputs.reviewed_sha }}
          LAST_REVIEWED_SHA: ${{ steps.context.outputs.last_reviewed_sha }}
          DEPS_OUTCOME: ${{ steps.deps.outcome }}
          DEPS_METHOD: ${{ steps.deps.outputs.method }}
        run: |
          set -euo pipefail

          if [ -z "${CODEX_ACCESS_TOKEN:-}" ] && [ -z "${CODEX_AUTH_JSON:-}" ]; then
            echo "Either CODEX_ACCESS_TOKEN or CODEX_AUTH_JSON secret is required." >&2
            exit 1
          fi

          export CODEX_HOME="$RUNNER_TEMP/codex-home"
          mkdir -p "$CODEX_HOME"

          # Prefer CODEX_AUTH_JSON (full auth.json from `codex auth` — includes
          # refresh token so Codex can route through chatgpt.com in CI).
          # Must be written to CODEX_HOME, not $HOME/.codex — Codex reads from CODEX_HOME.
          if [ -n "${CODEX_AUTH_JSON:-}" ]; then
            echo "Auth: writing full auth.json to CODEX_HOME (CODEX_AUTH_JSON)"
            printf '%s' "$CODEX_AUTH_JSON" > "$CODEX_HOME/auth.json"
            unset CODEX_ACCESS_TOKEN CODEX_AUTH_JSON
          else
            case "$CODEX_ACCESS_TOKEN" in
              at-*)  echo "Auth: personal access token (at-)" ;;
              sk-*)  echo "Auth: OpenAI API key (sk-) → OPENAI_API_KEY"
                     export OPENAI_API_KEY="$CODEX_ACCESS_TOKEN"
                     unset CODEX_ACCESS_TOKEN ;;
              *.*.*)
                     echo "Auth: OAuth JWT → CODEX_HOME/auth.json"
                     printf '{"auth_mode":"chatgpt","OPENAI_API_KEY":null,"tokens":{"access_token":"%s","id_token":null,"refresh_token":null,"account_id":null},"last_refresh":null}' \
                       "$CODEX_ACCESS_TOKEN" > "$CODEX_HOME/auth.json"
                     unset CODEX_ACCESS_TOKEN ;;
              *)     echo "Auth: other/opaque token — passing as CODEX_ACCESS_TOKEN" ;;
            esac
          fi

          prompt_file="$RUNNER_TEMP/codex-pr-review-prompt.md"
          review_file="$RUNNER_TEMP/codex-pr-review.md"

          # Trusted prompt from this shared repo (checked out at .ci-shared),
          # never from the PR under review.
          shared_prompt="$GITHUB_WORKSPACE/.ci-shared/.github/codex/prompts/codex-pr-review.md"
          if [ ! -f "$shared_prompt" ]; then
            echo "::error::Shared prompt not found at $shared_prompt (modsy/ci-workflows)." >&2
            exit 1
          fi

          {
            cat "$shared_prompt"
            echo
            echo "---"
            echo "## Runtime Context"
            echo
            cat "$RUNNER_TEMP/pr-context.md"
            echo
            echo "## Checkout and refs"
            echo "- HEAD is refs/pull/${PR_NUMBER}/merge: GitHub's merge of this PR into ${BASE_REF}."
            echo "- Its first parent (HEAD^1) is the ${BASE_REF} base; the second parent (HEAD^2) is the PR head."
            echo "- Reviewed SHA (current PR head): ${REVIEWED_SHA}"
            echo "- Dependency setup: ${DEPS_METHOD:-none} (outcome: ${DEPS_OUTCOME:-not run})"
            echo "- If the install outcome is success, you may run the repo's own typecheck/test commands; otherwise review statically."
            echo
            if [ -n "${LAST_REVIEWED_SHA:-}" ]; then
              echo "## Incremental review"
              echo "A prior Codex review was already posted for commit ${LAST_REVIEWED_SHA}."
              echo "Review ONLY the changes introduced since that commit — do not re-raise issues"
              echo "that were already visible in that earlier review."
              echo "- Incremental diff command: git diff ${LAST_REVIEWED_SHA}...HEAD^2"
              echo "- Full PR diff for context only: git diff HEAD^1...HEAD"
              echo "- Scope to one file: git diff ${LAST_REVIEWED_SHA}...HEAD^2 -- <path>"
            else
              echo "## Diff scope"
              echo "- Review only this PR's changes: git diff HEAD^1...HEAD"
              echo "- Scope to one file: git diff HEAD^1...HEAD -- <path>"
            fi
          } > "$prompt_file"

          codex exec \
            --ephemeral \
            --sandbox workspace-write \
            -c sandbox_workspace_write.network_access=true \
            -C "$GITHUB_WORKSPACE" \
            -o "$review_file" \
            - < "$prompt_file"

          if [ ! -s "$review_file" ]; then
            echo "Codex did not write a review." >&2
            exit 1
          fi

          # Extract JSON from between the markers.
          json_file="$RUNNER_TEMP/review.json"
          if grep -q 'BEGIN_REVIEW_JSON' "$review_file"; then
            sed -n '/BEGIN_REVIEW_JSON/{n;/END_REVIEW_JSON/!{:loop;p;n;/END_REVIEW_JSON/!b loop}}' \
              "$review_file" > "$json_file"
          else
            sed 's/^```json//;s/^```//' "$review_file" \
              | grep -v '^[[:space:]]*$' > "$json_file" || true
          fi

          if ! jq -e . "$json_file" > /dev/null 2>&1; then
            echo "::warning::Codex output is not valid JSON; falling back to plain comment."
            echo "FALLBACK" > "$RUNNER_TEMP/review-mode.txt"
            cp "$review_file" "$RUNNER_TEMP/review-fallback.md"
          else
            echo "JSON" > "$RUNNER_TEMP/review-mode.txt"
          fi

      # ---------------------------------------------------------------
      # 8. Post the review.
      #    Happy path: createReview with inline diff comments (Copilot behavior).
      #    Fallback: plain PR comment if JSON parsing failed.
      #
      #    Before posting, existing bot review comments are fetched and any
      #    finding that duplicates an already-posted file:line comment is
      #    suppressed to prevent repeated reports across pushes.
      # ---------------------------------------------------------------
      - name: Post Codex review
        id: post_review
        if: always() && steps.codex.outcome != 'skipped' && steps.codex.outcome != 'failure'
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          HEAD_SHA: ${{ steps.context.outputs.head_sha }}
          REVIEWED_SHA: ${{ steps.context.outputs.reviewed_sha }}
          RUNNER_TEMP_PATH: ${{ runner.temp }}
        with:
          github-token: ${{ github.token }}
          script: |
            const fs   = require("fs");
            const path = require("path");

            const tmp         = process.env.RUNNER_TEMP_PATH;
            const pull_number = Number(process.env.PR_NUMBER);
            const commit_id   = process.env.HEAD_SHA;
            const sha         = (process.env.REVIEWED_SHA || "").trim();
            const { owner, repo } = context.repo;

            const mode = fs.readFileSync(path.join(tmp, "review-mode.txt"), "utf8").trim();

            // ── Fallback: plain comment ──────────────────────────────────────
            if (mode !== "JSON") {
              let body = fs.readFileSync(
                path.join(tmp, "review-fallback.md"), "utf8"
              ).trim();
              const notice = sha ? `\n\n_Codex review of \`${sha}\`_` : "";
              body = `<!-- codex-reviewer -->\n${notice}\n\n${body}`;
              const created = await github.rest.issues.createComment({
                owner, repo, issue_number: pull_number, body,
              });
              core.setOutput("review_url", created.data.html_url);
              core.notice(`Codex review (plain comment fallback): ${created.data.html_url}`);
              return;
            }

            // ── Parse JSON review ────────────────────────────────────────────
            const review      = JSON.parse(
              fs.readFileSync(path.join(tmp, "review.json"), "utf8")
            );
            const rawComments = Array.isArray(review.comments) ? review.comments : [];

            // ── Fetch existing bot review comments to suppress duplicates ─────
            // Any finding at a file:line already flagged by a prior bot review
            // is dropped before posting, regardless of resolved state, so the
            // reviewer never re-raises a point it already made.
            let botCommentedLocations = new Set();
            try {
              // Paginate: a redundantly-reviewed PR can accumulate >100 bot
              // comments, and a missed page would let duplicates slip through.
              const existingReviewComments = await github.paginate(
                github.rest.pulls.listReviewComments,
                { owner, repo, pull_number, per_page: 100 },
              );
              for (const c of existingReviewComments) {
                const isBot =
                  c.user.type === "Bot" ||
                  c.user.login === "github-actions[bot]";
                if (isBot) {
                  const line = c.original_line ?? c.line;
                  if (c.path && line) {
                    botCommentedLocations.add(`${c.path}:${line}`);
                  }
                }
              }
              core.info(`Existing bot comment locations: ${botCommentedLocations.size}`);
            } catch (err) {
              core.warning(`Could not fetch existing review comments: ${err.message}`);
            }

            // ── Fetch diff to validate commentable line numbers ──────────────
            // The GitHub API only accepts inline comments on lines present in
            // the diff (added or context on the RIGHT side). Invalid lines
            // cause a 422; demote those findings to the review body instead.
            const { data: prFiles } = await github.rest.pulls.listFiles({
              owner, repo, pull_number,
            });

            const commentableLines = {};
            for (const file of prFiles) {
              commentableLines[file.filename] = new Set();
              if (!file.patch) continue;
              let lineNum = 0;
              for (const line of file.patch.split("\n")) {
                if (line.startsWith("@@")) {
                  const m = line.match(/@@ -\d+(?:,\d+)? \+(\d+)(?:,\d+)? @@/);
                  if (m) lineNum = parseInt(m[1], 10) - 1;
                } else if (line.startsWith("-")) {
                  // Removed line: left side only, skip right-side counter.
                } else {
                  // Added (+) or context line: commentable on right side.
                  lineNum++;
                  commentableLines[file.filename].add(lineNum);
                }
              }
            }

            // ── Split: inline vs body-only, suppressing duplicates ───────────
            const inlineComments   = [];
            const bodyOnlyFindings = [];
            let suppressedCount    = 0;

            for (const c of rawComments) {
              if (!c.path || !c.line || !c.body) continue;

              // Suppress findings at file:line already commented by the bot.
              const locationKey = `${c.path}:${c.line}`;
              if (botCommentedLocations.has(locationKey)) {
                core.info(`Suppressed duplicate finding at ${locationKey}`);
                suppressedCount++;
                continue;
              }

              if (commentableLines[c.path]?.has(c.line)) {
                inlineComments.push({
                  path: c.path, line: c.line, side: "RIGHT", body: c.body,
                });
              } else {
                bodyOnlyFindings.push(`**\`${c.path}:${c.line}\`** — ${c.body}`);
              }
            }

            if (suppressedCount > 0) {
              core.info(`Suppressed ${suppressedCount} duplicate finding(s) from prior reviews.`);
            }

            // ── Build review body ────────────────────────────────────────────
            // The review is always posted as a non-blocking COMMENT; surface the
            // model's verdict here as advisory text instead of a blocking state.
            const VERDICT_LABEL = {
              APPROVE: "No blocking issues found",
              REQUEST_CHANGES: "Changes suggested",
              COMMENT: "Comments only",
            };
            // Normalize the model's verdict: uppercase and map common aliases
            // (e.g. GitHub's CHANGES_REQUESTED, APPROVED) so the advisory label
            // is accurate instead of silently falling back to "Comments only".
            const VERDICT_ALIASES = {
              CHANGES_REQUESTED: "REQUEST_CHANGES",
              REQUEST_CHANGE: "REQUEST_CHANGES",
              APPROVED: "APPROVE",
              COMMENTED: "COMMENT",
            };
            const rawVerdict = String(review.verdict || "").trim().toUpperCase();
            const verdictKey = VERDICT_ALIASES[rawVerdict] || rawVerdict;
            const verdictNote = VERDICT_LABEL[verdictKey] || VERDICT_LABEL.COMMENT;
            // Compact findings count by severity (e.g. "2 issues · 1 suggestion").
            const counts = { blocking: 0, suggestion: 0, nitpick: 0 };
            for (const c of rawComments) {
              const sev = String(c.severity || "suggestion").toLowerCase();
              if (counts[sev] !== undefined) counts[sev]++;
            }
            const plural = (n, w) => `${n} ${w}${n === 1 ? "" : "s"}`;
            const parts = [];
            if (counts.blocking) parts.push(plural(counts.blocking, "issue"));
            if (counts.suggestion) parts.push(plural(counts.suggestion, "suggestion"));
            if (counts.nitpick) parts.push(plural(counts.nitpick, "nitpick"));
            const findingsLine = parts.length ? parts.join(" · ") : "no inline findings";

            const MAX_BODY = 65_536;
            let body = `<!-- codex-reviewer -->`;
            if (sha) body += `\n_Codex review of \`${sha}\`_`;
            body += `\n\n**Verdict:** ${verdictNote} — ${findingsLine} _(advisory; never blocks merge)_`;
            body += `\n\n${(review.summary || "").trim()}`;
            if (suppressedCount > 0) {
              body += `\n\n_${suppressedCount} finding(s) suppressed — already raised in a prior review._`;
            }
            if (bodyOnlyFindings.length > 0) {
              body +=
                "\n\n---\n\n**Findings on non-diff lines:**\n" +
                bodyOnlyFindings.map((f) => `- ${f}`).join("\n");
            }
            if (body.length > MAX_BODY) {
              body = body.slice(0, MAX_BODY - 50) + "\n\n_[truncated]_";
            }

            // ── Always post as COMMENT (non-blocking, like GitHub Copilot) ────
            // We never POST an APPROVE/REQUEST_CHANGES event — those set a
            // blocking review state that resolving threads does not clear. The
            // model's verdict is surfaced as advisory text in the body above;
            // the posted review event is always COMMENT.
            const event = "COMMENT";

            // ── Post PR review (Copilot behavior) ────────────────────────────
            const { data: posted } = await github.rest.pulls.createReview({
              owner,
              repo,
              pull_number,
              commit_id,
              event,
              body,
              comments: inlineComments,
            });

            core.setOutput("review_url", posted.html_url);
            core.notice(`Codex review posted: ${posted.html_url}`);

      # ---------------------------------------------------------------
      # 9. Job summary.
      # ---------------------------------------------------------------
      - name: Write run summary
        if: always()
        shell: bash
        env:
          REVIEW_URL: ${{ steps.post_review.outputs.review_url }}
          CODEX_OUTCOME: ${{ steps.codex.outcome }}
          ALREADY_REVIEWED: ${{ steps.context.outputs.already_reviewed }}
        run: |
          {
            echo "## Codex PR Review"
            echo
            if [ "${ALREADY_REVIEWED:-false}" = "true" ]; then
              echo "Skipped: HEAD was already reviewed by a prior run."
            elif [ "$CODEX_OUTCOME" = "success" ] && [ -n "${REVIEW_URL:-}" ]; then
              echo "Review posted: $REVIEW_URL"
            elif [ "$CODEX_OUTCOME" = "failure" ]; then
              echo ":x: Codex did not produce a review. Check the step logs above."
            else
              echo ":warning: Review step outcome: $CODEX_OUTCOME"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
