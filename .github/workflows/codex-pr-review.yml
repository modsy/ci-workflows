name: Codex PR Review (Reusable)
# Called by service repos via workflow_call. Never triggered directly.
# Auth pattern: product-org-len/atlas-pp-sxs-tool-app (Vincent's implementation)
# Output pattern: GitHub Copilot (PR review with inline diff comments + verdict)
# See examples/ for ready-to-use caller workflows.

on:
  workflow_call:
    inputs:
      pr_number:
        description: >
          Pull request number to review. Auto-resolved from the triggering
          event. Required when called via workflow_dispatch.
        required: false
        type: number

      pre_install_command:
        description: >
          Optional shell command run after checkout, before Codex. Use to
          install project dependencies. Runs with continue-on-error; the
          outcome is passed to Codex in the prompt.
        required: false
        type: string
        default: ""

      codex_version:
        description: >
          @openai/codex npm version to install. Pin in your caller for
          reproducible reviews. Bump deliberately.
        required: false
        type: string
        default: "0.142.0"

    secrets:
      CODEX_ACCESS_TOKEN:
        description: >
          Agent-identity JWT for the Codex CLI. Obtain by running
          `codex auth` locally and copying the JWT from ~/.codex/auth.json.
          Store as an org or repo secret.
        required: true

    outputs:
      review_url:
        description: "URL of the posted PR review."
        value: ${{ jobs.codex-review.outputs.review_url }}

jobs:
  codex-review:
    name: Review PR with Codex
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write

    outputs:
      review_url: ${{ steps.post_review.outputs.review_url }}

    steps:
      # ---------------------------------------------------------------
      # 1. Resolve PR number.
      # ---------------------------------------------------------------
      - name: Resolve PR number
        id: pr
        shell: bash
        env:
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          set -euo pipefail
          pr_number="${EVENT_PR_NUMBER:-${INPUT_PR_NUMBER:-}}"
          if [ -z "$pr_number" ]; then
            echo "Unable to resolve a pull request number." >&2
            exit 1
          fi
          if ! [[ "$pr_number" =~ ^[0-9]+$ ]]; then
            echo "Resolved pull request number '$pr_number' is not numeric." >&2
            exit 1
          fi
          echo "number=$pr_number" >> "$GITHUB_OUTPUT"

      # ---------------------------------------------------------------
      # 2. Check out the PR merge commit.
      #    persist-credentials: false keeps GITHUB_TOKEN out of the git
      #    config so Codex cannot use it to push or fetch.
      # ---------------------------------------------------------------
      - name: Check out PR merge commit
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ steps.pr.outputs.number }}/merge
          fetch-depth: 0
          persist-credentials: false

      # ---------------------------------------------------------------
      # 3. Fetch PR metadata, linked issues, and stamp the head SHA
      #    before Codex runs so a push mid-review cannot mislabel it.
      # ---------------------------------------------------------------
      - name: Fetch PR metadata and refs
        id: context
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          set -euo pipefail

          pr_json="$RUNNER_TEMP/pr.json"
          gh pr view "$PR_NUMBER" \
            --json number,title,body,url,baseRefName,baseRefOid,headRefName,headRefOid,isDraft,author \
            > "$pr_json"

          base_ref="$(jq -r '.baseRefName' "$pr_json")"

          # Capture the true PR head SHA before Codex runs.
          reviewed_sha="$(git rev-parse --short=7 'HEAD^2' 2>/dev/null \
            || jq -r '.headRefOid[0:7]' "$pr_json")"
          head_sha="$(git rev-parse 'HEAD^2' 2>/dev/null \
            || jq -r '.headRefOid' "$pr_json")"

          {
            echo "# Pull request context"
            echo
            jq -r '"- Number: #\(.number)\n- URL: \(.url)\n- Title: \(.title)\n- Author: \(.author.login)\n- Base: \(.baseRefName)@\(.baseRefOid)\n- Head: \(.headRefName)@\(.headRefOid)\n- Draft: \(.isDraft)"' "$pr_json"
            echo
            echo "## Body"
            jq -r '.body // ""' "$pr_json"
          } > "$RUNNER_TEMP/pr-context.md"

          pr_text="$(jq -r '"\(.title)\n\(.body // "")"' "$pr_json")"
          closing_refs="$(printf '%s' "$pr_text" | grep -oiE '(^|[^a-zA-Z])(close[sd]?|fix(es|ed)?|resolve[ds]?)[[:space:]:]+#[0-9]+' | grep -oE '[0-9]+' || true)"
          all_refs="$(printf '%s' "$pr_text" | grep -oE '(^|[^A-Za-z0-9_/-])#[0-9]+' | grep -oE '[0-9]+' || true)"
          refs="$(printf '%s\n%s\n' "$closing_refs" "$all_refs" \
            | awk -v self="$PR_NUMBER" 'NF && $0 != self && !seen[$0]++' \
            | head -n 6)"
          linked="$RUNNER_TEMP/linked-issues.md"
          : > "$linked"
          for n in $refs; do
            if issue_json="$(gh issue view "$n" --json number,title,state,body 2>/dev/null)"; then
              {
                echo
                printf '### Issue #%s\n\n' "$n"
                printf '%s' "$issue_json" | jq -r '"**\(.title)** [\(.state)]\n\n\(.body // "")"'
              } >> "$linked"
            fi
          done
          if [ -s "$linked" ]; then
            head -c 60000 "$linked" > "$linked.cap" && mv "$linked.cap" "$linked"
            {
              echo
              echo "## Linked issues (fetched for spec context)"
              cat "$linked"
            } >> "$RUNNER_TEMP/pr-context.md"
          fi

          echo "base_ref=$base_ref"         >> "$GITHUB_OUTPUT"
          echo "head_sha=$head_sha"         >> "$GITHUB_OUTPUT"
          echo "reviewed_sha=$reviewed_sha" >> "$GITHUB_OUTPUT"

      # ---------------------------------------------------------------
      # 4. Optional: install project dependencies.
      # ---------------------------------------------------------------
      - name: Install project dependencies
        id: deps
        if: inputs.pre_install_command != ''
        continue-on-error: true
        shell: bash
        run: ${{ inputs.pre_install_command }}

      # ---------------------------------------------------------------
      # 5. Set up Node.js and install Codex CLI.
      # ---------------------------------------------------------------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Codex CLI
        run: npm install -g @openai/codex@${{ inputs.codex_version }}

      # ---------------------------------------------------------------
      # 6. Enable unprivileged user namespaces for bubblewrap.
      # ---------------------------------------------------------------
      - name: Enable unprivileged user namespaces for bubblewrap
        shell: bash
        run: |
          set -euo pipefail
          if [ "$(sysctl -n kernel.unprivileged_userns_clone 2>/dev/null || true)" != "1" ]; then
            sudo sysctl -w kernel.unprivileged_userns_clone=1 || true
          fi
          if [ "$(sysctl -n kernel.apparmor_restrict_unprivileged_userns 2>/dev/null || true)" != "0" ]; then
            sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
          fi

      # ---------------------------------------------------------------
      # 7. Run Codex. The prompt instructs JSON output between
      #    BEGIN_REVIEW_JSON / END_REVIEW_JSON markers so the posting
      #    step can post via createReview with inline diff comments,
      #    identical to GitHub Copilot review behavior.
      # ---------------------------------------------------------------
      - name: Run Codex PR review
        id: codex
        shell: bash
        env:
          CODEX_ACCESS_TOKEN: ${{ secrets.CODEX_ACCESS_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          BASE_REF: ${{ steps.context.outputs.base_ref }}
          REVIEWED_SHA: ${{ steps.context.outputs.reviewed_sha }}
          DEPS_OUTCOME: ${{ steps.deps.outcome }}
          PRE_INSTALL_CMD: ${{ inputs.pre_install_command }}
        run: |
          set -euo pipefail

          if [ -z "${CODEX_ACCESS_TOKEN:-}" ]; then
            echo "CODEX_ACCESS_TOKEN secret is required." >&2
            exit 1
          fi

          case "$CODEX_ACCESS_TOKEN" in
            at-*)    echo "CODEX_ACCESS_TOKEN class: personal access token (at-)" ;;
            sk-*)    echo "CODEX_ACCESS_TOKEN class: OpenAI API key (sk-)"
                     export OPENAI_API_KEY="$CODEX_ACCESS_TOKEN"
                     unset CODEX_ACCESS_TOKEN ;;
            *.*.*)   echo "CODEX_ACCESS_TOKEN class: agent-identity JWT" ;;
            *)       echo "CODEX_ACCESS_TOKEN class: other/opaque" ;;
          esac
          echo "CODEX_ACCESS_TOKEN length: ${#CODEX_ACCESS_TOKEN}"

          export CODEX_HOME="$RUNNER_TEMP/codex-home"
          mkdir -p "$CODEX_HOME"

          prompt_file="$RUNNER_TEMP/codex-pr-review-prompt.md"
          review_file="$RUNNER_TEMP/codex-pr-review.md"

          repo_prompt=".github/codex/prompts/codex-pr-review.md"
          if [ ! -f "$repo_prompt" ]; then
            echo "::error::No prompt found at $repo_prompt. Create it from examples/prompt-template.md." >&2
            exit 1
          fi

          {
            cat "$repo_prompt"
            echo
            echo "---"
            echo "## Runtime Context"
            echo
            cat "$RUNNER_TEMP/pr-context.md"
            echo
            echo "## Checkout and refs"
            echo "- HEAD is refs/pull/${PR_NUMBER}/merge: GitHub's merge of this PR into ${BASE_REF}."
            echo "- Its first parent (HEAD^1) is the ${BASE_REF} base; the second parent (HEAD^2) is the PR head."
            echo "- Review only this PR's changes: git diff HEAD^1...HEAD"
            echo "- Scope to one file: git diff HEAD^1...HEAD -- <path>"
            echo "- Reviewed SHA: ${REVIEWED_SHA}"
            if [ -n "${PRE_INSTALL_CMD:-}" ]; then
              echo "- Dependency install command: ${PRE_INSTALL_CMD}"
              echo "- Dependency install outcome: ${DEPS_OUTCOME:-not run}"
            fi
          } > "$prompt_file"

          codex exec \
            --ephemeral \
            --sandbox workspace-write \
            -c sandbox_workspace_write.network_access=true \
            -C "$GITHUB_WORKSPACE" \
            -o "$review_file" \
            - < "$prompt_file"

          if [ ! -s "$review_file" ]; then
            echo "Codex did not write a review." >&2
            exit 1
          fi

          # Extract JSON from between the markers.
          json_file="$RUNNER_TEMP/review.json"
          if grep -q 'BEGIN_REVIEW_JSON' "$review_file"; then
            sed -n '/BEGIN_REVIEW_JSON/{n;/END_REVIEW_JSON/!{:loop;p;n;/END_REVIEW_JSON/!b loop}}' \
              "$review_file" > "$json_file"
          else
            sed 's/^```json//;s/^```//' "$review_file" \
              | grep -v '^[[:space:]]*$' > "$json_file" || true
          fi

          if ! jq -e . "$json_file" > /dev/null 2>&1; then
            echo "::warning::Codex output is not valid JSON; falling back to plain comment."
            echo "FALLBACK" > "$RUNNER_TEMP/review-mode.txt"
            cp "$review_file" "$RUNNER_TEMP/review-fallback.md"
          else
            echo "JSON" > "$RUNNER_TEMP/review-mode.txt"
          fi

      # ---------------------------------------------------------------
      # 8. Post the review.
      #    Happy path: createReview with inline diff comments (Copilot behavior).
      #    Fallback: plain PR comment if JSON parsing failed.
      # ---------------------------------------------------------------
      - name: Post Codex review
        id: post_review
        if: always() && steps.codex.outcome != 'skipped' && steps.codex.outcome != 'failure'
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          HEAD_SHA: ${{ steps.context.outputs.head_sha }}
          REVIEWED_SHA: ${{ steps.context.outputs.reviewed_sha }}
          RUNNER_TEMP_PATH: ${{ runner.temp }}
        with:
          github-token: ${{ github.token }}
          script: |
            const fs   = require("fs");
            const path = require("path");

            const tmp         = process.env.RUNNER_TEMP_PATH;
            const pull_number = Number(process.env.PR_NUMBER);
            const commit_id   = process.env.HEAD_SHA;
            const sha         = (process.env.REVIEWED_SHA || "").trim();
            const { owner, repo } = context.repo;

            const mode = fs.readFileSync(path.join(tmp, "review-mode.txt"), "utf8").trim();

            // ── Fallback: plain comment ──────────────────────────────────────
            if (mode !== "JSON") {
              let body = fs.readFileSync(
                path.join(tmp, "review-fallback.md"), "utf8"
              ).trim();
              const notice = sha ? `\n\n_Codex review of \`${sha}\`_` : "";
              body = `<!-- codex-reviewer -->\n${notice}\n\n${body}`;
              const created = await github.rest.issues.createComment({
                owner, repo, issue_number: pull_number, body,
              });
              core.setOutput("review_url", created.data.html_url);
              core.notice(`Codex review (plain comment fallback): ${created.data.html_url}`);
              return;
            }

            // ── Parse JSON review ────────────────────────────────────────────
            const review      = JSON.parse(
              fs.readFileSync(path.join(tmp, "review.json"), "utf8")
            );
            const rawComments = Array.isArray(review.comments) ? review.comments : [];

            // ── Fetch diff to validate commentable line numbers ──────────────
            // The GitHub API only accepts inline comments on lines present in
            // the diff (added or context on the RIGHT side). Invalid lines
            // cause a 422; demote those findings to the review body instead.
            const { data: prFiles } = await github.rest.pulls.listFiles({
              owner, repo, pull_number,
            });

            const commentableLines = {};
            for (const file of prFiles) {
              commentableLines[file.filename] = new Set();
              if (!file.patch) continue;
              let lineNum = 0;
              for (const line of file.patch.split("\n")) {
                if (line.startsWith("@@")) {
                  const m = line.match(/@@ -\d+(?:,\d+)? \+(\d+)(?:,\d+)? @@/);
                  if (m) lineNum = parseInt(m[1], 10) - 1;
                } else if (line.startsWith("-")) {
                  // Removed line: left side only, skip right-side counter.
                } else {
                  // Added (+) or context line: commentable on right side.
                  lineNum++;
                  commentableLines[file.filename].add(lineNum);
                }
              }
            }

            // ── Split: inline vs body-only ───────────────────────────────────
            const inlineComments   = [];
            const bodyOnlyFindings = [];

            for (const c of rawComments) {
              if (!c.path || !c.line || !c.body) continue;
              if (commentableLines[c.path]?.has(c.line)) {
                inlineComments.push({
                  path: c.path, line: c.line, side: "RIGHT", body: c.body,
                });
              } else {
                bodyOnlyFindings.push(`**\`${c.path}:${c.line}\`** — ${c.body}`);
              }
            }

            // ── Build review body ────────────────────────────────────────────
            const MAX_BODY = 65_536;
            let body = `<!-- codex-reviewer -->`;
            if (sha) body += `\n_Codex review of \`${sha}\`_`;
            body += `\n\n${(review.summary || "").trim()}`;
            if (bodyOnlyFindings.length > 0) {
              body +=
                "\n\n---\n\n**Findings on non-diff lines:**\n" +
                bodyOnlyFindings.map((f) => `- ${f}`).join("\n");
            }
            if (body.length > MAX_BODY) {
              body = body.slice(0, MAX_BODY - 50) + "\n\n_[truncated]_";
            }

            // ── Map verdict ──────────────────────────────────────────────────
            const validEvents = new Set(["APPROVE", "REQUEST_CHANGES", "COMMENT"]);
            const event = validEvents.has(review.verdict) ? review.verdict : "COMMENT";

            // ── Post PR review (Copilot behavior) ────────────────────────────
            const { data: posted } = await github.rest.pulls.createReview({
              owner,
              repo,
              pull_number,
              commit_id,
              event,
              body,
              comments: inlineComments,
            });

            core.setOutput("review_url", posted.html_url);
            core.notice(`Codex review posted: ${posted.html_url}`);

      # ---------------------------------------------------------------
      # 9. Job summary.
      # ---------------------------------------------------------------
      - name: Write run summary
        if: always()
        shell: bash
        env:
          REVIEW_URL: ${{ steps.post_review.outputs.review_url }}
          CODEX_OUTCOME: ${{ steps.codex.outcome }}
        run: |
          {
            echo "## Codex PR Review"
            echo
            if [ "$CODEX_OUTCOME" = "success" ] && [ -n "${REVIEW_URL:-}" ]; then
              echo "Review posted: $REVIEW_URL"
            elif [ "$CODEX_OUTCOME" = "failure" ]; then
              echo ":x: Codex did not produce a review. Check the step logs above."
            else
              echo ":warning: Review step outcome: $CODEX_OUTCOME"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
