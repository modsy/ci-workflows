name: Codex PR Review (Reusable)
# Called by service repos via workflow_call. Never triggered directly.
# See examples/ for ready-to-use caller workflows.

on:
  workflow_call:
    inputs:
      pr_number:
        description: >
          Pull request number to review. Auto-resolved from the triggering
          event if omitted. Required when called via workflow_dispatch.
        required: false
        type: number

      codex_version:
        description: >
          @openai/codex npm package version to install. Pin this in your
          caller for reproducible reviews. Bump deliberately.
        required: false
        type: string
        default: "0.142.0"

      pre_install_command:
        description: >
          Optional shell command executed after checkout and before Codex
          runs. Use to install project dependencies so Codex can invoke
          linters, type-checkers, or test runners. Runs with
          continue-on-error; a failure is logged but does not abort the review.
        required: false
        type: string
        default: ""

    secrets:
      CODEX_ACCESS_TOKEN:
        description: >
          Claude Code access token (starts with "at-") or agent-identity JWT.
          Obtain from claude.ai account settings. Store as an org-level secret
          scoped to the repos that need it.
        required: true

    outputs:
      review_url:
        description: "URL of the posted Codex PR review."
        value: ${{ jobs.codex-review.outputs.review_url }}

jobs:
  codex-review:
    name: Review PR with Codex
    runs-on: ubuntu-latest

    concurrency:
      group: >-
        codex-pr-review-${{
          github.event.pull_request.number
          || inputs.pr_number
          || github.run_id
        }}
      cancel-in-progress: false

    permissions:
      contents: read
      pull-requests: write

    outputs:
      review_url: ${{ steps.post_review.outputs.review_url }}

    steps:
      # ---------------------------------------------------------------
      # 1. Resolve the PR number.
      # ---------------------------------------------------------------
      - name: Resolve PR number
        id: pr
        shell: bash
        env:
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          set -euo pipefail
          pr_number="${EVENT_PR_NUMBER:-${INPUT_PR_NUMBER:-}}"
          if [[ -z "$pr_number" ]]; then
            echo "::error::Cannot resolve a PR number. Pass pr_number as an input when calling via workflow_dispatch." >&2
            exit 1
          fi
          if ! [[ "$pr_number" =~ ^[0-9]+$ ]]; then
            echo "::error::PR number '${pr_number}' is not numeric." >&2
            exit 1
          fi
          echo "number=$pr_number" >> "$GITHUB_OUTPUT"

      # ---------------------------------------------------------------
      # 2. Check out the PR merge commit.
      #    persist-credentials: false keeps GITHUB_TOKEN out of the git
      #    config so Codex cannot use it to push or fetch.
      # ---------------------------------------------------------------
      - name: Check out PR merge commit
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ steps.pr.outputs.number }}/merge
          fetch-depth: 0
          persist-credentials: false

      # ---------------------------------------------------------------
      # 3. Fetch PR metadata, linked issues, and the head SHA we will
      #    stamp on the review. SHA is captured before Codex runs so a
      #    push mid-review cannot mislabel the posted review.
      # ---------------------------------------------------------------
      - name: Fetch PR metadata and build context
        id: context
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          set -euo pipefail

          pr_json="$RUNNER_TEMP/pr.json"
          gh pr view "$PR_NUMBER" \
            --json number,title,body,url,baseRefName,baseRefOid,headRefName,headRefOid,isDraft,author \
            > "$pr_json"

          base_ref="$(jq -r '.baseRefName' "$pr_json")"

          # Full PR head SHA for createReview commit_id.
          head_sha="$(git rev-parse 'HEAD^2' 2>/dev/null \
            || jq -r '.headRefOid' "$pr_json")"
          reviewed_sha="${head_sha:0:7}"

          {
            echo "# Pull request context"
            echo
            jq -r '"- Number: #\(.number)
          - URL: \(.url)
          - Title: \(.title)
          - Author: \(.author.login)
          - Base: \(.baseRefName)@\(.baseRefOid)
          - Head: \(.headRefName)@\(.headRefOid)
          - Draft: \(.isDraft)"' "$pr_json"
            echo
            echo "## Body"
            jq -r '.body // "(no body)"' "$pr_json"
          } > "$RUNNER_TEMP/pr-context.md"

          # Fetch linked issues.
          pr_text="$(jq -r '"\(.title)\n\(.body // "")"' "$pr_json")"
          closing_refs="$(printf '%s' "$pr_text" \
            | grep -oiE '(^|[^a-zA-Z])(close[sd]?|fix(es|ed)?|resolve[ds]?)[[:space:]:]+#[0-9]+' \
            | grep -oE '[0-9]+' || true)"
          all_refs="$(printf '%s' "$pr_text" \
            | grep -oE '(^|[^A-Za-z0-9_/-])#[0-9]+' \
            | grep -oE '[0-9]+' || true)"
          refs="$(printf '%s\n%s\n' "$closing_refs" "$all_refs" \
            | awk -v self="$PR_NUMBER" 'NF && $0 != self && !seen[$0]++' \
            | head -n 6)"

          linked="$RUNNER_TEMP/linked-issues.md"
          : > "$linked"
          for n in $refs; do
            if issue_json="$(gh issue view "$n" --json number,title,state,body 2>/dev/null)"; then
              {
                echo
                printf '### Issue #%s\n\n' "$n"
                printf '%s' "$issue_json" \
                  | jq -r '"**\(.title)** [\(.state)]\n\n\(.body // "")"'
              } >> "$linked"
            fi
          done

          if [[ -s "$linked" ]]; then
            head -c 60000 "$linked" > "$linked.cap" && mv "$linked.cap" "$linked"
            {
              echo
              echo "## Linked issues (pre-fetched for spec context)"
              cat "$linked"
            } >> "$RUNNER_TEMP/pr-context.md"
          fi

          echo "base_ref=$base_ref"         >> "$GITHUB_OUTPUT"
          echo "head_sha=$head_sha"         >> "$GITHUB_OUTPUT"
          echo "reviewed_sha=$reviewed_sha" >> "$GITHUB_OUTPUT"

      # ---------------------------------------------------------------
      # 4. Optional: install project dependencies.
      # ---------------------------------------------------------------
      - name: Install project dependencies
        id: deps
        if: inputs.pre_install_command != ''
        continue-on-error: true
        shell: bash
        run: ${{ inputs.pre_install_command }}

      # ---------------------------------------------------------------
      # 5. Set up Node.js and install Codex CLI.
      # ---------------------------------------------------------------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Codex CLI
        shell: bash
        run: npm install -g @openai/codex@${{ inputs.codex_version }}

      # ---------------------------------------------------------------
      # 6. Enable unprivileged user namespaces for bubblewrap.
      # ---------------------------------------------------------------
      - name: Enable unprivileged user namespaces
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$(sysctl -n kernel.unprivileged_userns_clone 2>/dev/null || true)" != "1" ]]; then
            sudo sysctl -w kernel.unprivileged_userns_clone=1 || true
          fi
          if [[ "$(sysctl -n kernel.apparmor_restrict_unprivileged_userns 2>/dev/null || true)" != "0" ]]; then
            sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
          fi

      # ---------------------------------------------------------------
      # 7. Build the prompt and run Codex.
      #    Codex is instructed to output a JSON review object between
      #    BEGIN_REVIEW_JSON / END_REVIEW_JSON markers so we can parse
      #    it reliably without depending on clean JSON-only output.
      # ---------------------------------------------------------------
      - name: Run Codex PR review
        id: codex
        shell: bash
        env:
          CODEX_ACCESS_TOKEN: ${{ secrets.CODEX_ACCESS_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          BASE_REF: ${{ steps.context.outputs.base_ref }}
          REVIEWED_SHA: ${{ steps.context.outputs.reviewed_sha }}
          DEPS_OUTCOME: ${{ steps.deps.outcome }}
          PRE_INSTALL_CMD: ${{ inputs.pre_install_command }}
        run: |
          set -euo pipefail

          if [[ -z "${CODEX_ACCESS_TOKEN:-}" ]]; then
            echo "::error::CODEX_ACCESS_TOKEN secret is not set." >&2
            exit 1
          fi

          case "$CODEX_ACCESS_TOKEN" in
            at-*)  echo "CODEX_ACCESS_TOKEN class: personal access token (at-)" ;;
            *.*.*) echo "CODEX_ACCESS_TOKEN class: agent-identity JWT" ;;
            *)     echo "CODEX_ACCESS_TOKEN class: other/opaque" ;;
          esac
          echo "CODEX_ACCESS_TOKEN length: ${#CODEX_ACCESS_TOKEN}"

          export CODEX_HOME="$RUNNER_TEMP/codex-home"
          mkdir -p "$CODEX_HOME"

          prompt_file="$RUNNER_TEMP/prompt.md"
          review_file="$RUNNER_TEMP/review.md"

          repo_prompt=".github/codex/prompts/codex-pr-review.md"
          if [[ -f "$repo_prompt" ]]; then
            cat "$repo_prompt" > "$prompt_file"
          else
            cat > "$prompt_file" << 'BUILTIN_PROMPT'
          You are an AI code reviewer running inside GitHub Actions. Your job is to
          review this pull request and produce a structured JSON review — identical in
          spirit to a GitHub Copilot code review.

          ## Review scope

          Review only the changes introduced by this PR:

            git diff HEAD^1...HEAD

          Open actual files at the cited lines before reporting a finding. Never report
          issues based on the diff alone.

          ## What to check

          For every changed file, evaluate:

          - **Correctness** — logic errors, off-by-one, null dereferences, unhandled edge cases.
          - **Security** — injection (SQL, shell, XSS), hardcoded secrets, OWASP Top 10.
          - **Performance** — N+1 queries, missing indexes, large bundle imports, O(n^2) loops.
          - **Reliability** — missing retries, no timeouts, state not cleaned up on error.
          - **Test coverage** — changed behaviour covered? Assertions meaningful?
          - **API contracts** — removed/renamed fields, type changes, new required parameters.

          ## Signal bar

          Only report findings you are confident about. Do not flag style preferences not
          enforced by the project linter, or issues outside the diff.

          ## CI adapter rules

          - Do not edit, stage, commit, or push any file.
          - Use the pre-fetched PR context below; do not call gh commands directly.
          - Run linters or tests only if the dependency installation succeeded (check the
            runtime context for the outcome).
          BUILTIN_PROMPT
          fi

          # Append the JSON output instructions + runtime context.
          {
            echo
            echo "---"
            echo "## Output format (REQUIRED)"
            echo
            echo "You MUST output your review between these exact markers, as a single valid JSON object."
            echo "Do not wrap it in markdown code fences. Do not output anything after END_REVIEW_JSON."
            echo
            echo "BEGIN_REVIEW_JSON"
            echo '{'
            echo '  "verdict": "APPROVE" | "REQUEST_CHANGES" | "COMMENT",'
            echo '  "summary": "One-paragraph plain-text overview of findings for the review body. Include the reviewed SHA: '"${REVIEWED_SHA}"'.",'
            echo '  "comments": ['
            echo '    {'
            echo '      "path": "relative/path/to/file.ts",'
            echo '      "line": 42,'
            echo '      "severity": "blocking" | "suggestion" | "nitpick",'
            echo '      "body": "Finding description. Be specific — include why this matters and how to fix it."'
            echo '    }'
            echo '  ]'
            echo '}'
            echo "END_REVIEW_JSON"
            echo
            echo "Rules for comments:"
            echo "- path must be a real file path from the diff (relative to repo root)."
            echo "- line must be a line number that exists in the diff (added or context line on the right side)."
            echo "- If you are not certain a line is in the diff, put the finding in summary instead."
            echo "- Prefix each body with the severity: [Blocking], [Suggestion], or [Nitpick]."
            echo "- Use an empty comments array ([]) if there are no inline findings."
            echo
            echo "---"
            echo "## Runtime context"
            echo
            cat "$RUNNER_TEMP/pr-context.md"
            echo
            echo "## Checkout layout"
            echo "- HEAD = refs/pull/${PR_NUMBER}/merge (GitHub's merge of this PR into ${BASE_REF})"
            echo "- HEAD^1 = ${BASE_REF} base commit"
            echo "- HEAD^2 = PR head commit (reviewed SHA: ${REVIEWED_SHA})"
            echo "- Three-dot diff: git diff HEAD^1...HEAD"
            echo "- Single-file diff: git diff HEAD^1...HEAD -- <path>"
            echo
            if [[ -n "${PRE_INSTALL_CMD:-}" ]]; then
              echo "## Dependency installation"
              echo "- Command: ${PRE_INSTALL_CMD}"
              echo "- Outcome: ${DEPS_OUTCOME:-not run}"
              if [[ "${DEPS_OUTCOME:-}" == "success" ]]; then
                echo "- Tools installed by that command are available."
              else
                echo "- Installation did not complete successfully."
              fi
            else
              echo "## Dependency installation"
              echo "- No pre_install_command set. Project tools are not pre-installed."
            fi
          } >> "$prompt_file"

          codex exec \
            --ephemeral \
            --sandbox workspace-write \
            -c sandbox_workspace_write.network_access=true \
            -C "$GITHUB_WORKSPACE" \
            -o "$review_file" \
            - < "$prompt_file"

          if [[ ! -s "$review_file" ]]; then
            echo "::error::Codex produced an empty review." >&2
            exit 1
          fi

          # Extract JSON from between the markers.
          json_file="$RUNNER_TEMP/review.json"
          if grep -q 'BEGIN_REVIEW_JSON' "$review_file"; then
            sed -n '/BEGIN_REVIEW_JSON/{n;/END_REVIEW_JSON/!{:loop;p;n;/END_REVIEW_JSON/!b loop}}' \
              "$review_file" > "$json_file"
          else
            # Codex did not use markers; try treating the whole output as JSON.
            # Strip markdown code fences if present.
            sed 's/^```json//;s/^```//' "$review_file" | grep -v '^[[:space:]]*$' > "$json_file" || true
          fi

          if ! jq -e . "$json_file" > /dev/null 2>&1; then
            echo "::warning::Codex output is not valid JSON; falling back to plain comment."
            # Write a fallback marker so the posting step knows to use createComment.
            echo "FALLBACK_PLAIN_COMMENT" > "$RUNNER_TEMP/review-mode.txt"
            cp "$review_file" "$RUNNER_TEMP/review-fallback.md"
          else
            echo "JSON" > "$RUNNER_TEMP/review-mode.txt"
          fi

      # ---------------------------------------------------------------
      # 8. Post the review.
      #    - Happy path: parse JSON, validate lines against the diff,
      #      post via createReview with inline comments (mirrors Copilot).
      #    - Fallback: if JSON parsing failed, post as a plain PR comment.
      # ---------------------------------------------------------------
      - name: Post Codex review
        id: post_review
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          HEAD_SHA: ${{ steps.context.outputs.head_sha }}
          RUNNER_TEMP_PATH: ${{ runner.temp }}
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require("fs");
            const path = require("path");
            const tmp = process.env.RUNNER_TEMP_PATH;
            const pull_number = Number(process.env.PR_NUMBER);
            const commit_id = process.env.HEAD_SHA;
            const { owner, repo } = context.repo;

            const mode = fs.readFileSync(path.join(tmp, "review-mode.txt"), "utf8").trim();

            // ---- Fallback: post plain comment ----
            if (mode !== "JSON") {
              const body = fs.readFileSync(path.join(tmp, "review-fallback.md"), "utf8").trim();
              const created = await github.rest.issues.createComment({
                owner, repo, issue_number: pull_number, body,
              });
              core.setOutput("review_url", created.data.html_url);
              core.notice(`Codex review (plain comment fallback): ${created.data.html_url}`);
              return;
            }

            // ---- Parse JSON review ----
            const review = JSON.parse(fs.readFileSync(path.join(tmp, "review.json"), "utf8"));
            const rawComments = Array.isArray(review.comments) ? review.comments : [];

            // ---- Fetch PR diff to validate line numbers ----
            // Only lines present in the diff (added or context on RIGHT side) can
            // receive inline comments. Invalid lines cause a 422 from the API.
            const { data: prFiles } = await github.rest.pulls.listFiles({
              owner, repo, pull_number,
            });

            const commentableLines = {};
            for (const file of prFiles) {
              commentableLines[file.filename] = new Set();
              if (!file.patch) continue;
              let lineNum = 0;
              for (const line of file.patch.split("\n")) {
                if (line.startsWith("@@")) {
                  const m = line.match(/@@ -\d+(?:,\d+)? \+(\d+)(?:,\d+)? @@/);
                  if (m) lineNum = parseInt(m[1], 10) - 1;
                } else if (line.startsWith("-")) {
                  // Removed line: exists only on LEFT side, skip RIGHT count.
                } else {
                  // Added (+) or context ( ) line: commentable on RIGHT side.
                  lineNum++;
                  commentableLines[file.filename].add(lineNum);
                }
              }
            }

            // ---- Split findings: inline vs. body-only ----
            const inlineComments = [];
            const bodyOnlyFindings = [];

            for (const c of rawComments) {
              if (!c.path || !c.line || !c.body) continue;
              const eligible = commentableLines[c.path]?.has(c.line);
              if (eligible) {
                inlineComments.push({ path: c.path, line: c.line, side: "RIGHT", body: c.body });
              } else {
                bodyOnlyFindings.push(`**\`${c.path}:${c.line}\`** — ${c.body}`);
              }
            }

            // ---- Build review body ----
            const MAX_BODY = 65536;
            let body = (review.summary || "").trim();
            if (bodyOnlyFindings.length > 0) {
              body += "\n\n---\n\n**Findings outside the diff:**\n" +
                bodyOnlyFindings.map((f) => `- ${f}`).join("\n");
            }
            if (body.length > MAX_BODY) {
              body = body.slice(0, MAX_BODY - 50) + "\n\n_[truncated]_";
            }

            // ---- Map verdict ----
            const validEvents = new Set(["APPROVE", "REQUEST_CHANGES", "COMMENT"]);
            const event = validEvents.has(review.verdict) ? review.verdict : "COMMENT";

            // ---- Post PR review ----
            const { data: posted } = await github.rest.pulls.createReview({
              owner,
              repo,
              pull_number,
              commit_id,
              event,
              body,
              comments: inlineComments,
            });

            core.setOutput("review_url", posted.html_url);
            core.notice(`Codex review posted: ${posted.html_url}`);

      # ---------------------------------------------------------------
      # 9. Job summary.
      # ---------------------------------------------------------------
      - name: Write job summary
        if: always()
        shell: bash
        env:
          REVIEW_URL: ${{ steps.post_review.outputs.review_url }}
          CODEX_OUTCOME: ${{ steps.codex.outcome }}
        run: |
          {
            echo "## Codex PR Review"
            echo
            if [[ "$CODEX_OUTCOME" == "success" && -n "${REVIEW_URL:-}" ]]; then
              echo "Review posted: $REVIEW_URL"
            elif [[ "$CODEX_OUTCOME" == "failure" ]]; then
              echo ":x: Codex did not produce a review. Check the step logs above."
            else
              echo ":warning: Review step outcome: $CODEX_OUTCOME"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
